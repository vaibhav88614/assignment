services:
  # ─── Backend API ───────────────────────────────────────────
  - type: web
    name: accredverify-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: accredverify-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false  # Set after Vercel deploy — e.g. ["https://your-app.vercel.app"]
      - key: CLOUDINARY_URL
        sync: false  # Format: cloudinary://API_KEY:API_SECRET@CLOUD_NAME
      - key: RESEND_API_KEY
        sync: false  # From https://resend.com/api-keys
      - key: RESEND_FROM_EMAIL
        value: "AccredVerify <onboarding@myworkdayjobs.work>"
      - key: PYTHON_VERSION
        value: "3.11.7"

  # ─── PostgreSQL Database ───────────────────────────────────
databases:
  - name: accredverify-db
    plan: free
    region: oregon
